name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'config/**'
      - 'infra/**'
      - '**.md'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  INSTANCE_ID: i-0d870a4da470e3e37
  SSM_PREFIX: /nyp-demo

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::459471000310:role/nyp-demo-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull latest code and restart service
        id: ssm_run
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /var/www/nyp-demo",
              "sudo -u ec2-user git pull origin main",
              "sudo -u ec2-user bash -c \"cd /var/www/nyp-demo/server && npm install --omit=dev\"",
              "systemctl restart nyp-demo"
            ]}' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for command to complete
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm_run.outputs.command_id }}" \
            --instance-id "${{ env.INSTANCE_ID }}"

      - name: Check command output
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm_run.outputs.command_id }}" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --query "[Status, StatusDetails, StandardOutputContent]" \
            --output text

      - name: Update deploy metadata in SSM
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${{ github.sha }}"

          aws ssm put-parameter \
            --name "${{ env.SSM_PREFIX }}/deployedAt" \
            --value "$TIMESTAMP" \
            --type String \
            --overwrite

          aws ssm put-parameter \
            --name "${{ env.SSM_PREFIX }}/commitSha" \
            --value "$COMMIT_SHA" \
            --type String \
            --overwrite
